<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans&display=swap" rel="stylesheet">
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Font Configuration    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../css/login_style.css">
</head>

<body>
    <h2>Register</h2>
    <form id="registerForm">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" required placeholder="Enter your First Name">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" required placeholder="Enter your Last Name">
        <label for="userName">User Name</label>
        <input type="text" id="userName" required placeholder="Enter your User Name">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="Enter your Email">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Enter your password">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" required placeholder="ReEnter your password">
        <div class="gender">
            <label>Gender</label>
            <div class="gender-options">
                <label><input type="radio" name="gender" value="male"> Male</label>
                <label><input type="radio" name="gender" value="female"> Female</label>
            </div>
        </div>
        <label for="country">Country</label>
            <select id="country" required>
                <option value="" disabled selected hidden>Select Country</option>
                <option value="egypt">Egypt</option>
                <option value="saudi-arabia">Saudi Arabia</option>
                <option value="uae">United Arab Emirates</option>
                <option value="qatar">Qatar</option>
                <option value="kuwait">Kuwait</option>
                <option value="bahrain">Bahrain</option>
                <option value="oman">Oman</option>
                <option value="jordan">Jordan</option>
                <option value="lebanon">Lebanon</option>
                <option value="syria">Syria</option>
                <option value="iraq">Iraq</option>
                <option value="morocco">Morocco</option>
                <option value="algeria">Algeria</option>
                <option value="tunisia">Tunisia</option>
                <option value="sudan">Sudan</option>
                <option value="usa">USA</option>
                <option value="uk">UK</option>
                <option value="germany">Germany</option>
                <option value="france">France</option>
                <option value="italy">Italy</option>
                <option value="spain">Spain</option>
                <option value="turkey">Turkey</option>
                <option value="india">India</option>
                <option value="china">China</option>
                <option value="japan">Japan</option>
                <option value="south-korea">South Korea</option>
                <option value="canada">Canada</option>
                <option value="brazil">Brazil</option>
                <option value="australia">Australia</option>
            </select>
        <div class="terms">
                <label for="terms">I agree to all terms</label>
                <input type="checkbox" id="terms" required>
            </div>

        <button type="submit">Register</button>
        <div class="login-link">
            <span>Already have an account !</span>
            <a href="login.html">Login</a>
        </div>
    </form>
    <script src="../../js/register_script.js"></script>
</body>

</html>
