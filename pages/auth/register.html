<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans&display=swap" rel="stylesheet">
    <title>Istabraq Official Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/login_style.css">
</head>

<body>
    <h2>Register</h2>
    <form id="registerForm">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName"  placeholder="ex: John">
        <label for="name">Last Name</label>
        <input type="text" id="lastName" placeholder="ex: Doe">
        <label for="email">Email</label>
        <input  type="text" id="email" placeholder="ex: john.doe@example.com">
        <label for="phone">Phone Number</label>
        <input type="number" id="number" placeholder="+20 100 000 0000">
        <label for="password">Password</label>
        <div class="password-box">
            <input type="password" id="password"  placeholder="Enter your password">
            <button type="button" onclick="togglePassword('password', 'eyeIcon1')">
                <i id="eyeIcon1" class="fa-solid fa-eye-slash" style="color: rgb(0, 0, 0);"></i>
            </button>
        </div>
        <label for="confirmPassword">Confirm Password</label>
        <div class="password-box">
            <input  type="password" id="confirmPassword" placeholder="ReEnter your password">
            <button type="button" onclick="togglePassword('confirmPassword', 'eyeIcon2')">
                <i id="eyeIcon2" class="fa-solid fa-eye-slash" style="color: rgb(0, 0, 0);"></i>
            </button>
        </div>
        <div class="gender">
            <label>Gender</label>
            <div class="gender-options">
                <label><input type="radio" name="gender" value="male"> Male</label>
                <label><input type="radio" name="gender" value="female"> Female</label>
            </div>
        </div>
        <label for="country" style="margin-bottom: 8px;">Nationality</label>
        <select id="country" style="padding: 5px;
                font-size: 14px;
                font-weight:500 ;
                font-family: 'Plus Jakarta Sans', sans-serif;
                border: 1px solid #ccc;
                border-radius: 4px;
                opacity: 70%;
                padding: 14px;">
            <option value="" disabled selected hidden>Select Country</option>
            <option value="egypt">Egypt</option>
            <option value="saudi-arabia">Saudi Arabia</option>
            <option value="uae">United Arab Emirates</option>
            <option value="qatar">Qatar</option>
            <option value="kuwait">Kuwait</option>
            <option value="bahrain">Bahrain</option>
            <option value="oman">Oman</option>
            <option value="jordan">Jordan</option>
            <option value="lebanon">Lebanon</option>
            <option value="syria">Syria</option>
            <option value="iraq">Iraq</option>
            <option value="morocco">Morocco</option>
            <option value="algeria">Algeria</option>
            <option value="tunisia">Tunisia</option>
            <option value="sudan">Sudan</option>
            <option value="usa">USA</option>
            <option value="uk">UK</option>
            <option value="germany">Germany</option>
            <option value="france">France</option>
            <option value="italy">Italy</option>
            <option value="spain">Spain</option>
            <option value="turkey">Turkey</option>
            <option value="india">India</option>
            <option value="china">China</option>
            <option value="japan">Japan</option>
            <option value="south-korea">South Korea</option>
            <option value="canada">Canada</option>
            <option value="brazil">Brazil</option>
            <option value="australia">Australia</option>
        </select>
        <!-- <div class="terms">
            <label for="terms">I agree to all terms</label>
            <input type="checkbox" id="terms" required>
        </div> -->
        <div>
            <button type="submit">Register</button>
            <a href="login.html">
        </div>
        <div class="login-link">
            <span>Already have an account !</span>
            <a href="login.html">Login</a>
        </div>
    </form>
    <script src="../../js/login_script.js"></script>
</body>

</html>
