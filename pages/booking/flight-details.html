<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Details</title>
    <link rel="stylesheet" href="../css/flight-details.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
</head>
<body>
      <div class="flight-details">
            <div class="left">
                  <div class="flight-small">
                        <div class="code">FLIGHT NX-402</div>
                        <div class="class">FIRST CLASS RESIDENCE</div>
                  </div>
                  <div class="destination">
                        <div class="start">LONDON</div>
                        <div class="to">TO</div>
                        <div class="end">DUBAI</div>
                  </div>
                  <div class="card">
                        <div class="start dist">
                              <div class="title">DEPARTURE</div>
                              <div class="time">09:45</div>
                              <div class="small">LHR • Terminal 5</div>
                        </div>
                        <div class="mid">
                              <i class="fa-solid fa-plane-departure icon"></i>
                              <div class="small">7h 15m Duration</div>
                        </div>
                        <div class="end dist">
                              <div class="title">ARRIVAL</div>
                              <div class="time">20:00</div>
                              <div class="small">DXB • Terminal 3</div>
                        </div>
                  </div>
            </div>
      </div>
</body>
</html>
