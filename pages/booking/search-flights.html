<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Flights</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../../css/search-flights.css">

</head>

<body>
    <main>
        <!-- Head -->
        <section class="search-hero">
            <div class="search-div-eyebrow">
                <p class="search-eyebrow">
                    <i class="fa-solid fa-globe" aria-hidden="true"></i>
                    Fly with Prestige
                </p>
            </div>
            <h1 class="search-title">Where to <em>next?</em></h1>
            <p class="search-subtitle">Every journey is a legacy in the making. Curate your next horizon with
                unparalleled precision</p>
        </section>

        <!-- search form  -->
        <section class="search-section">
            <div class="search-card">
                <form class="search-form" action="#" method="get">
                    <!-- row 1-->
                    <div class="search-first-row">
                        <!-- from -->
                        <div class="search-field">
                            <label class="search-field-label">
                                <i class="fa-solid fa-location-dot"></i>
                                From
                            </label>
                            <input class="search-field-input" type="text" placeholder="Departure city or airport" />
                        </div>

                        <!-- swap -->
                        <div class="search-swap-divider">
                            <span class="search-swap-circle">
                                <i class="fa-solid fa-arrow-right-arrow-left"></i>
                            </span>
                        </div>

                        <!-- to -->
                        <div class="search-field">
                            <label class="search-field-label">
                                <i class="fa-solid fa-plane"></i>
                                To
                            </label>
                            <input class="search-field-input" type="text" placeholder="Destination city or airport" />
                        </div>


                        <!-- Departure date -->
                        <div class="search-field">
                            <label class="search-field-label">
                                <i class="fa-regular fa-calendar-days"></i>
                                Departure
                            </label>
                            <input class="search-field-input" type="date" />
                        </div>

                        <!-- Rrturn data -->
                        <div class="search-field">
                            <label class="search-field-label">
                                <i class="fa-regular fa-calendar-check"></i>
                                Return

                            </label>
                            <input class="search-field-input" type="date" />
                        </div>

                    </div>

                    <!-- ── row 2 -->
                    <div class="search-form-footer">
                        <!-- Passengers -->
                        <div class="search-footer-field--passengers">
                            <div class="search-footer-field-label">
                                <i class="fa-solid fa-user"></i>
                                Travellers
                            </div>

                            <input class="search-footer-field-input" type="number" value="1" min="1" max="9" />
                        </div>

                        <!-- vertical  -->
                        <div class="search-footer-vr"></div>

                        <!-- cabin class -->
                        <div class="search-cabin-group">

                            <div class="search-footer-field-label">
                                <i class="fa-solid fa-briefcase"></i>
                                Cabin Class
                            </div>

                            <div class="search-cabin-pills">
                                <input type="radio" id="cabin-economy" name="cabin-class" class="search-cabin-radio" />

                                <label for="cabin-economy" class="search-cabin-pill">
                                    <i class="fa-solid fa-chair"></i>
                                    Economy
                                </label>


                                <input type="radio" id="cabin-business" name="cabin-class" class="search-cabin-radio" />

                                <label for="cabin-business" class="search-cabin-pill">
                                    <i class="fa-solid fa-briefcase"></i>
                                    Business
                                </label>

                                <input type="radio" id="cabin-first-class" name="cabin-class"
                                    class="search-cabin-radio" />

                                <label for="cabin-first-class" class="search-cabin-pill">
                                    <i class="fa-solid fa-star"></i>
                                    First Class
                                </label>

                            </div>
                        </div>

                        <!-- SEARCH BUTTON -->
                        <button type="submit" class="search-btn">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <span>Explore Flights</span>
                        </button>

                    </div>

                </form>
            </div>
        </section>

    </main>
    <script src="/js/search.js"></script>
</body>

</html>
